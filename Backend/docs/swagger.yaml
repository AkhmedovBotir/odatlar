basePath: /api/v1
definitions:
  github_com_odatlar-bot_backend_internal_domain.AdminStatus:
    enum:
    - active
    - inactive
    type: string
    x-enum-varnames:
    - AdminStatusActive
    - AdminStatusInactive
  github_com_odatlar-bot_backend_internal_dto.AdminListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/github_com_odatlar-bot_backend_internal_dto.AdminResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  github_com_odatlar-bot_backend_internal_dto.AdminResponse:
    properties:
      created_at:
        type: string
      first_name:
        type: string
      id:
        type: integer
      last_name:
        type: string
      phone:
        type: string
      status:
        $ref: '#/definitions/github_com_odatlar-bot_backend_internal_domain.AdminStatus'
      updated_at:
        type: string
      username:
        type: string
    type: object
  github_com_odatlar-bot_backend_internal_dto.CreateAdminRequest:
    properties:
      first_name:
        maxLength: 100
        minLength: 2
        type: string
      last_name:
        maxLength: 100
        minLength: 2
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      phone:
        maxLength: 20
        minLength: 9
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - first_name
    - last_name
    - password
    - phone
    - username
    type: object
  github_com_odatlar-bot_backend_internal_dto.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  github_com_odatlar-bot_backend_internal_dto.LoginResponse:
    properties:
      admin:
        $ref: '#/definitions/github_com_odatlar-bot_backend_internal_dto.AdminResponse'
      token:
        type: string
    type: object
  github_com_odatlar-bot_backend_internal_dto.ProfileResponse:
    properties:
      admin:
        $ref: '#/definitions/github_com_odatlar-bot_backend_internal_dto.AdminResponse'
    type: object
  github_com_odatlar-bot_backend_internal_dto.UpdateAdminRequest:
    properties:
      first_name:
        maxLength: 100
        minLength: 2
        type: string
      last_name:
        maxLength: 100
        minLength: 2
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      phone:
        maxLength: 20
        minLength: 9
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    type: object
  github_com_odatlar-bot_backend_internal_dto.UpdateStatusRequest:
    properties:
      status:
        allOf:
        - $ref: '#/definitions/github_com_odatlar-bot_backend_internal_domain.AdminStatus'
        enum:
        - active
        - inactive
    required:
    - status
    type: object
  github_com_odatlar-bot_backend_pkg_response.ErrorBody:
    properties:
      error:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@odatlar-bot.uz
    name: API Support
  description: Admin CRUD, login va profil APIlari
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Odatlar Bot Admin API
  version: "1.0"
paths:
  /admins:
    get:
      description: Barcha adminlarni sahifalangan holda qaytaradi
      parameters:
      - default: 1
        description: Sahifa raqami
        in: query
        name: page
        type: integer
      - default: 10
        description: Sahifa hajmi
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_internal_dto.AdminListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Adminlar ro'yxati
      tags:
      - Admins
    post:
      consumes:
      - application/json
      description: Yangi admin foydalanuvchisini yaratadi
      parameters:
      - description: Admin ma'lumotlari
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_odatlar-bot_backend_internal_dto.CreateAdminRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_internal_dto.AdminResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Yangi admin yaratish
      tags:
      - Admins
  /admins/{id}:
    delete:
      description: Adminni tizimdan o'chiradi
      parameters:
      - description: Admin ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Adminni o'chirish
      tags:
      - Admins
    get:
      description: Bitta admin ma'lumotlarini qaytaradi
      parameters:
      - description: Admin ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_internal_dto.AdminResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Adminni ID bo'yicha olish
      tags:
      - Admins
    put:
      consumes:
      - application/json
      description: Admin ma'lumotlarini yangilaydi
      parameters:
      - description: Admin ID
        in: path
        name: id
        required: true
        type: integer
      - description: Yangilash ma'lumotlari
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_odatlar-bot_backend_internal_dto.UpdateAdminRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_internal_dto.AdminResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Adminni yangilash
      tags:
      - Admins
  /admins/{id}/status:
    patch:
      consumes:
      - application/json
      description: Admin statusini active yoki inactive qiladi
      parameters:
      - description: Admin ID
        in: path
        name: id
        required: true
        type: integer
      - description: Status ma'lumotlari
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_odatlar-bot_backend_internal_dto.UpdateStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_internal_dto.AdminResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Admin statusini yangilash
      tags:
      - Admins
  /auth/login:
    post:
      consumes:
      - application/json
      description: Username va password orqali tizimga kirish
      parameters:
      - description: Login ma'lumotlari
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_odatlar-bot_backend_internal_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_internal_dto.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
      summary: Admin login
      tags:
      - Auth
  /auth/profile:
    get:
      description: Joriy admin profil ma'lumotlarini qaytaradi
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_internal_dto.ProfileResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_odatlar-bot_backend_pkg_response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Admin profili
      tags:
      - Auth
securityDefinitions:
  BearerAuth:
    description: 'JWT token. Format: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
