securityDefinitions:
  BearerAuth:
    description: 'JWT token. Format: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
  BotToken:
    description: 'Telegram bot token. Format: Bearer {bot_token}'
    in: header
    name: Authorization
    type: apiKey
  TelegramInitData:
    description: 'Telegram WebApp initData. Alternativa: Authorization: tma {initData}'
    in: header
    name: X-Telegram-Init-Data
    type: apiKey
swagger: "2.0"
